name: Deploy a disenopaginas.cl/productos

on:
  push:
    branches:
      - main   # se dispara cada vez que haces push a main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Fix paths para subdirectorio
        run: |
          find ./dist -name "*.html" -exec sed -i 's|/_astro/|./_astro/|g' {} \;
          find ./dist -name "*.html" -exec sed -i 's|src="/hero-backgrounds/|src="./hero-backgrounds/|g' {} \;
          find ./dist -name "*.css"  -exec sed -i 's|/_astro/|./_astro/|g' {} \;
          find ./dist -name "*.js"   -exec sed -i 's|/_astro/|./_astro/|g' {} \;

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          # El usuario FTP ya inicia dentro de /home/disenop2/public_html,
          # por lo que indicamos solo la carpeta destino real para evitar duplicar public_html
          server-dir: ./productos-muestra/
