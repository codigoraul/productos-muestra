name: Deploy a disenopaginas.cl/productos

on:
  push:
    branches:
      - main   # se dispara cada vez que haces push a main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Fix paths para subdirectorio
        run: |
          python3 - << 'PYEOF'
          import os, re

          dist = './dist'
          for dirpath, _, files in os.walk(dist):
            for fname in files:
              fpath = os.path.join(dirpath, fname)
              ext = fname.rsplit('.', 1)[-1] if '.' in fname else ''

              if ext == 'html':
                with open(fpath, encoding='utf-8') as f:
                  txt = f.read()
                # src="/...  →  src="./...
                txt = re.sub(r'src="/((?!/|http))', r'src="./\1', txt)
                # href="/_astro/  →  href="./_astro/
                txt = re.sub(r'href="/_astro/', r'href="./_astro/', txt)
                with open(fpath, 'w', encoding='utf-8') as f:
                  f.write(txt)

              elif ext == 'css':
                with open(fpath, encoding='utf-8') as f:
                  txt = f.read()
                # url(/hero-backgrounds/  →  url(../hero-backgrounds/  (CSS está en _astro/)
                txt = re.sub(r'url\(/((?!/|http))', r'url(../\1', txt)
                txt = re.sub(r"url\('/((?!/|http))", r"url('../\1", txt)
                txt = re.sub(r'url\("/((?!/|http))', r'url("../\1', txt)
                # /_astro/  →  ./_astro/
                txt = txt.replace('/_astro/', './_astro/')
                with open(fpath, 'w', encoding='utf-8') as f:
                  f.write(txt)

              elif ext == 'js':
                with open(fpath, encoding='utf-8') as f:
                  txt = f.read()
                txt = txt.replace('/_astro/', './_astro/')
                with open(fpath, 'w', encoding='utf-8') as f:
                  f.write(txt)

          print('Paths fixed.')
          PYEOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          # El usuario FTP ya inicia dentro de /home/disenop2/public_html,
          # por lo que indicamos solo la carpeta destino real para evitar duplicar public_html
          server-dir: ./productos-muestra/
